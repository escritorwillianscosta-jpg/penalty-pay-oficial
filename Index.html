<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penalty Pay Oficial | GaMonix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Arial Black', sans-serif; background: #000; color: #fff; overflow: hidden; }

        .game-wrapper {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            background: linear-gradient(to bottom, #001a33, #000); padding: 10px;
        }

        /* PLACAR ESTILO COPA */
        .header-ui {
            display: flex; justify-content: space-between; align-items: center;
            background: #111; border: 3px solid #ffdf00; border-radius: 15px;
            padding: 10px; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255,223,0,0.4);
        }
        .score-val { font-size: 26px; color: #ffdf00; text-shadow: 2px 2px #000; }

        /* CAMPO DE JOGO */
        .pitch {
            flex: 1; background: #2e7d32; border: 4px solid #fff; border-radius: 20px;
            position: relative; overflow: hidden;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(0,0,0,0.05) 50px, rgba(0,0,0,0.1) 100px);
        }

        /* TORCIDA REALISTA */
        .crowd-area { height: 60px; width: 100%; background: #111; display: flex; justify-content: center; align-items: flex-end; gap: 2px; }
        .fan-unit { width: 10px; height: 15px; background: #fed330; border-radius: 3px 3px 0 0; position: relative; }
        .fan-unit::after { content: ''; position: absolute; top: -8px; left: 1px; width: 8px; height: 8px; background: #ffe0bd; border-radius: 50%; }
        .fan-unit:nth-child(even) { background: #2ecc71; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .goal-celebration .fan-unit { animation: jump 0.3s infinite; }

        /* GOL 3D */
        .goal-post {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 230px; height: 100px; border: 6px solid #fff; border-bottom: none; z-index: 5;
            background: repeating-linear-gradient(rgba(255,255,255,0.1) 0 2px, transparent 2px 10px),
                        repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0 2px, transparent 2px 10px);
        }

        /* JOGADOR DO BRASIL (SVG) */
        .brazil-player {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 110px; z-index: 40;
        }

        /* GOLEIRO */
        .keeper-man {
            position: absolute; top: 140px; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 90px; z-index: 20; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* BOLA CLÁSSICA (SVG) */
        .soccer-ball {
            position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; z-index: 50; transition: 0.5s;
        }

        /* BOTÃO BÔNUS */
        .btn-action {
            width: 100%; padding: 18px; background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border: none; border-radius: 15px; color: #fff; font-size: 20px; font-weight: bold;
            margin-top: 10px; box-shadow: 0 8px #1b5e20; text-transform: uppercase;
        }

        /* PROVAS DE PAGAMENTO */
        .payout-box {
            height: 75px; background: rgba(0,0,0,0.7); margin-top: 10px;
            border-radius: 12px; padding: 8px; font-size: 11px; overflow: hidden; border: 1px solid #2ecc71;
        }
        .pay-row { display: flex; justify-content: space-between; color: #2ecc71; margin-bottom: 3px; animation: fadeInUp 0.4s; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="color:#ffdf00; font-size: 38px; margin-bottom: 30px;">PENALTY PAY 🏆</h1>
        <button onclick="launchGame()" style="padding: 20px 60px; background:#2ecc71; color:white; border:none; border-radius:50px; font-size:24px; font-weight:bold; box-shadow: 0 10px #1b5e20;">JOGAR AGORA!</button>
    </div>

    <div class="game-wrapper">
        <div class="header-ui">
            <div class="score-val">🇧🇷 <span id="pt-br">0</span></div>
            <div style="text-align:center;">
                <div style="color:#ff4444; font-size:12px;">VIDAS: <span id="v-lives">5</span></div>
                <div style="color:#2ecc71; font-size:12px;">LTC: <span id="v-bal">0.00000</span></div>
            </div>
            <div class="score-val"><span id="pt-ar">0</span> 🇦🇷</div>
        </div>

        <div class="pitch" id="game-pitch" onclick="processKick(event)">
            <div class="crowd-area" id="stands"></div>
            <div class="goal-post"></div>
            
            <div class="keeper-man" id="gk-man">
                <svg width="60" height="90" viewBox="0 0 60 90">
                    <circle cx="30" cy="18" r="13" fill="#ffe0bd"/>
                    <rect x="12" y="32" width="36" height="50" rx="8" fill="#00d2ff"/>
                </svg>
            </div>

            <div class="brazil-player">
                <svg width="80" height="110" viewBox="0 0 80 110">
                    <circle cx="40" cy="18" r="14" fill="#ffe0bd"/>
                    <rect x="20" y="32" width="40" height="50" rx="8" fill="#fed330"/>
                    <rect x="20" y="82" width="40" height="18" fill="#00468e"/>
                    <text x="40" y="62" font-size="22" fill="#2ecc71" text-anchor="middle" font-weight="bold">10</text>
                </svg>
            </div>

            <div class="soccer-ball" id="ball-obj">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <circle cx="50" cy="50" r="48" fill="#fff" stroke="#000" stroke-width="2"/>
                    <path d="M50 5 L65 35 L95 40 L75 65 L80 95 L50 80 L20 95 L25 65 L5 40 L35 35 Z" fill="#000"/>
                    <circle cx="50" cy="50" r="15" fill="#000"/>
                </svg>
            </div>
        </div>

        <div id="ui-msg" style="text-align:center; height:35px; font-size:22px; color:#ffdf00; margin-top:10px;"></div>

        <button class="btn-action" onclick="window.open('https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c'); lives=5; updateUI();">BÔNUS</button>

        <div class="payout-box" id="pay-feed"></div>

        <p style="font-size:10px; text-align:center; margin-top:10px; color:#444;">Produzido por: GAMONIX © Todos os Direitos Reservados</p>
    </div>

    <script>
        let lives = 5, balance = 0, br = 0, ar = 0, busy = false;
        const sndGol = new Audio('gol.mp3'); const sndDef = new Audio('defesa.mp3');

        function launchGame() {
            document.getElementById('splash-screen').style.display = 'none';
            const s = document.getElementById('stands');
            for(let i=0; i<45; i++) s.innerHTML += '<div class="fan-unit"></div>';
            updateUI(); setInterval(feedPay, 3000);
        }

        function updateUI() {
            document.getElementById('v-lives').innerText = lives;
            document.getElementById('v-bal').innerText = balance.toFixed(5);
            document.getElementById('pt-br').innerText = br;
            document.getElementById('pt-ar').innerText = ar;
        }

        function feedPay() {
            const f = document.getElementById('pay-feed');
            const r = document.createElement('div'); r.className = 'pay-row';
            r.innerHTML = `<span>user_\({Math.floor(Math.random()*999)}***</span><span>\){(Math.random()*0.005).toFixed(5)} LTC ✅</span>`;
            f.prepend(r); if(f.children.length > 3) f.lastChild.remove();
        }

        function processKick(event) {
            if(busy) return;
            if(lives <= 0) {
                const m = document.getElementById('ui-msg');
                m.innerText = "Clica em Bônus para carregar vidas!";
                m.style.color = "#ff4444"; return;
            }

            busy = true;
            const b = document.getElementById('ball-obj');
            const g = document.getElementById('gk-man');
            const m = document.getElementById('ui-msg');
            const rect = document.getElementById('game-pitch').getBoundingClientRect();
            const x = (event.clientX || (event.touches && event.touches[0].clientX)) - rect.left;
            
            let dir = x < rect.width/3 ? 'L' : x > (rect.width/3)*2 ? 'R' : 'C';
            let gkDir = ['L', 'C', 'R'][Math.floor(Math.random()*3)];

            b.style.transition = "all 0.5s ease-out";
            b.style.left = dir === 'L' ? '20%' : dir === 'R' ? '80%' : '50%';
            g.style.left = gkDir === 'L' ? '20%' : gkDir === 'R' ? '80%' : '50%';

            if(dir === gkDir) {
                b.style.bottom = "230px"; b.style.transform = "translateX(-50%) scale(0.6)";
            } else {
                b.style.bottom = "330px"; b.style.transform = "translateX(-50%) scale(0.4) rotate(720deg)";
            }

            setTimeout(() => {
                if(dir === gkDir) {
                    lives--; ar++; m.innerText = "DEFENDEU! 🧤"; m.style.color = "#ff4444";
                    sndDef.play().catch(()=>{}); b.style.zIndex = "10";
                } else {
                    br++; balance += 0.00001; m.innerText = "GOOOOOL! ⚽"; m.style.color = "#2ecc71";
                    sndGol.play().catch(()=>{});
                    document.getElementById('stands').classList.add('goal-celebration');
                }
                updateUI();
                setTimeout(() => {
                    b.style.transition = "none"; b.style.bottom = "65px"; b.style.left = "50%";
                    b.style.transform = "translateX(-50%) scale(1) rotate(0deg)";
                    b.style.zIndex = "50"; g.style.left = "50%"; m.innerText = ""; busy = false;
                    document.getElementById('stands').classList.remove('goal-celebration');
                }, 1500);
            }, 500);
        }
    </script>
</body>
</html>
