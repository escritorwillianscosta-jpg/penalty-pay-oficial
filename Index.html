<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penalty Pay Oficial | GaMonix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #fff; overflow: hidden; }

        .game-wrapper {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            background: #001a33; padding: 10px;
        }

        /* PLACAR */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #000; border: 2px solid #ffdf00; border-radius: 12px;
            padding: 8px 15px; margin-bottom: 8px;
        }
        .score { font-size: 22px; font-weight: bold; color: #ffdf00; }

        /* ESTÁDIO */
        .stadium-field {
            flex: 1; background: #228b22; border: 3px solid #fff; border-radius: 15px;
            position: relative; overflow: hidden;
            background-image: linear-gradient(to bottom, #1a5e1a 0%, #2e7d32 100%);
        }

        /* TORCIDA REALISTA (SVG Pattern) */
        .crowd-bg {
            height: 60px; width: 100%; background: #111;
            background-image: radial-gradient(circle, #fed330 20%, transparent 20%), radial-gradient(circle, #2ecc71 20%, transparent 20%);
            background-size: 10px 10px; background-position: 0 0, 5px 5px; opacity: 0.8;
        }
        @keyframes cheer { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .goal-active .crowd-bg { animation: cheer 0.2s infinite; }

        /* GOL */
        .goal-net {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 90px; border: 5px solid #fff; border-bottom: none;
            background: rgba(255,255,255,0.1); z-index: 5;
        }

        /* JOGADOR DO BRASIL (SVG) */
        .brazil-player {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 100px; z-index: 40;
        }

        /* GOLEIRO */
        .gk {
            position: absolute; top: 130px; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 80px; z-index: 20; transition: 0.3s ease-out;
        }

        /* BOLA CLÁSSICA (SVG) */
        .soccer-ball {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; z-index: 50; transition: 0.5s;
        }

        /* BOTÃO BÔNUS */
        .btn-pay {
            width: 100%; padding: 18px; background: #2ecc71; border: none;
            border-radius: 12px; color: #fff; font-size: 20px; font-weight: bold;
            margin-top: 10px; box-shadow: 0 6px #1b5e20;
        }

        /* PROVAS DE PAGAMENTO */
        .payout-area {
            height: 70px; background: rgba(0,0,0,0.6); margin-top: 8px;
            border-radius: 10px; padding: 5px; font-size: 11px; overflow: hidden;
        }
        .pay-item { display: flex; justify-content: space-between; color: #2ecc71; margin-bottom: 3px; animation: fadeInUp 0.5s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #start-modal {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="start-modal">
        <h1 style="color:#ffdf00; margin-bottom: 30px; font-size: 35px;">PENALTY PAY 🏆</h1>
        <button onclick="initGame()" style="padding: 20px 60px; background:#2ecc71; color:white; border:none; border-radius:50px; font-size:22px; font-weight:bold;">JOGAR AGORA!</button>
    </div>

    <div class="game-wrapper">
        <div class="top-bar">
            <div class="score">🇧🇷 <span id="br-score">0</span></div>
            <div style="text-align:center; font-size:11px;">
                <div style="color:#ff4444;">VIDAS: <span id="lives-count">5</span></div>
                <div style="color:#2ecc71;">LTC: <span id="balance-count">0.00000</span></div>
            </div>
            <div class="score"><span id="ar-score">0</span> 🇦🇷</div>
        </div>

        <div class="stadium-field" id="field" onclick="handleTouch(event)">
            <div class="crowd-bg" id="crowd"></div>
            <div class="goal-net"></div>
            
            <!-- GOLEIRO -->
            <div class="gk" id="goalkeeper">
                <svg width="60" height="80" viewBox="0 0 60 80">
                    <circle cx="30" cy="15" r="12" fill="#ffe0bd"/>
                    <rect x="10" y="27" width="40" height="50" rx="5" fill="#00d2ff"/>
                </svg>
            </div>

            <!-- JOGADOR DO BRASIL (Sempre visível) -->
            <div class="brazil-player">
                <svg width="80" height="100" viewBox="0 0 80 100">
                    <circle cx="40" cy="15" r="12" fill="#ffe0bd"/>
                    <rect x="20" y="27" width="40" height="50" rx="5" fill="#fed330"/>
                    <rect x="20" y="77" width="40" height="15" fill="#00468e"/>
                    <text x="40" y="60" font-size="20" fill="#2ecc71" text-anchor="middle" font-weight="bold">10</text>
                </svg>
            </div>

            <!-- BOLA CLÁSSICA (SVG) -->
            <div class="soccer-ball" id="ball">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <circle cx="50" cy="50" r="48" fill="#fff" stroke="#000" stroke-width="2"/>
                    <path d="M50 2 L65 35 L98 40 L75 65 L80 98 L50 80 L20 98 L25 65 L2 40 L35 35 Z" fill="#000"/>
                </svg>
            </div>
        </div>

        <div id="status-text" style="text-align:center; height:30px; font-size:22px; color:#ffdf00; margin-top:10px; font-weight:bold;"></div>

        <button class="btn-pay" onclick="window.open('https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c'); lives=5; refresh();">BÔNUS (VIDAS)</button>

        <div class="payout-area" id="pay-feed"></div>

        <p style="font-size:9px; text-align:center; margin-top:8px; color:#666;">Produzido por: GAMONIX © Todos os Direitos Reservados</p>
    </div>

    <script>
        let lives = 5, balance = 0, br = 0, ar = 0, locking = false;
        const sndGol = new Audio('gol.mp3');
        const sndDef = new Audio('defesa.mp3');

        function initGame() {
            document.getElementById('start-modal').style.display = 'none';
            refresh();
            setInterval(createPayment, 3000);
        }

        function refresh() {
            document.getElementById('lives-count').innerText = lives;
            document.getElementById('balance-count').innerText = balance.toFixed(5);
            document.getElementById('br-score').innerText = br;
            document.getElementById('ar-score').innerText = ar;
        }

        function createPayment() {
            const f = document.getElementById('pay-feed');
            const item = document.createElement('div');
            item.className = 'pay-row';
            item.style.display = "flex"; item.style.justifyContent = "space-between"; item.style.color = "#2ecc71";
            item.innerHTML = `<span>user_\({Math.floor(Math.random()*999)}***</span><span>\){(Math.random()*0.005).toFixed(5)} LTC ✅</span>`;
            f.prepend(item);
            if(f.children.length > 3) f.lastChild.remove();
        }

        function handleTouch(e) {
            if(locking) return;
            if(lives <= 0) {
                document.getElementById('status-text').innerText = "Clica em BÔNUS!";
                document.getElementById('status-text').style.color = "#ff4444";
                return;
            }

            locking = true;
            const b = document.getElementById('ball');
            const g = document.getElementById('goalkeeper');
            const m = document.getElementById('status-text');
            const field = document.getElementById('field').getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - field.left;
            
            let side = x < field.width/3 ? 'L' : x > (field.width/3)*2 ? 'R' : 'C';
            let gkSide = ['L', 'C', 'R'][Math.floor(Math.random()*3)];

            // Pulo do Goleiro
            g.style.left = gkSide === 'L' ? '20%' : gkSide === 'R' ? '80%' : '50%';

            // Chute da Bola
            b.style.transition = "all 0.4s ease-in";
            b.style.left = side === 'L' ? '20%' : side === 'R' ? '80%' : '50%';
            
            if(side === gkSide) {
                b.style.top = "140px"; // Para na mão do goleiro
                b.style.transform = "translateX(-50%) scale(0.4)";
            } else {
                b.style.top = "80px"; // Vai pro fundo do gol
                b.style.transform = "translateX(-50%) scale(0.3)";
            }

            setTimeout(() => {
                if(side === gkSide) {
                    lives--; ar++; m.innerText = "DEFENDEU! 🧤"; m.style.color = "#ff4444";
                    sndDef.play().catch(()=>{});
                    b.style.opacity = "0"; // Simula que o goleiro agarrou
                } else {
                    br++; balance += 0.00001; m.innerText = "GOOOOOL! ⚽"; m.style.color = "#2ecc71";
                    sndGol.play().catch(()=>{});
                    document.getElementById('field').classList.add('goal-active');
                }
                refresh();
                
                setTimeout(() => {
                    b.style.transition = "none"; b.style.opacity = "1";
                    b.style.top = "auto"; b.style.bottom = "70px"; b.style.left = "50%";
                    b.style.transform = "translateX(-50%) scale(1)";
                    g.style.left = "50%"; m.innerText = ""; locking = false;
                    document.getElementById('field').classList.remove('goal-active');
                }, 1500);
            }, 4000); // Pequeno delay para a animação completar
            
            // Correção do tempo: 400ms da animação + delay
            setTimeout(() => {}, 400); 
        }
        
        // Re-ajuste de tempo do setTimeout para 500ms
        const originalTimeout = setTimeout;
        setTimeout = function(fn, delay) {
            if(delay === 4000) delay = 500;
            return originalTimeout(fn, delay);
        };
    </script>
</body>
</html>
