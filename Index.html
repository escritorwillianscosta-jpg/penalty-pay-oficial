<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Pay 🇧🇷 - Ganhe LTC Jogando Futebol | GaMonix</title>
    <style>
        /* ESTILO ORIGINAL DO ZIP */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #004d40;
            background-image: radial-gradient(circle at center, #00695c 0%, #004d40 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .game-container {
            text-align: center;
            background: #00264d;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid #ffdf00;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        h1 { font-size: 26px; margin: 5px 0; color: #ffdf00; text-shadow: 2px 2px #000; font-weight: 900; }
        .slogan-vibrante { font-size: 18px; color: #2ecc71; font-weight: 900; margin-bottom: 15px; animation: glow 2s infinite; }
        @keyframes glow { 0%, 100% { color: #2ecc71; transform: scale(1); } 50% { color: #ffdf00; transform: scale(1.05); } }

        .stats-panel { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #2ecc71; }
        .vital-stats { display: flex; justify-content: space-around; margin-bottom: 8px; font-weight: bold; }
        .crypto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 12px; text-align: left; }

        .field {
            background-color: #2e7d32;
            background-image: linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 40px 40px;
            height: 320px;
            position: relative;
            border: 3px solid white;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .goal {
            width: 180px; height: 90px; border: 5px solid white; border-bottom: none;
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.05);
        }

        /* BONECOS 2D ORIGINAIS */
        .goalkeeper { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 70px; z-index: 10; transition: all 0.3s; }
        .gk-head { width: 18px; height: 18px; background: #ffe0bd; border-radius: 50%; margin: 0 auto; border: 2px solid #000; }
        .gk-body { width: 24px; height: 34px; background: #3498db; margin: -2px auto 0; border: 2px solid #000; border-radius: 5px; position: relative; }
        .gk-arm-l, .gk-arm-r { position: absolute; width: 20px; height: 8px; background: #ffe0bd; border: 2px solid #000; top: 15px; border-radius: 4px; }
        .gk-arm-l { left: -14px; transform: rotate(20deg); } .gk-arm-r { right: -14px; transform: rotate(-20deg); }

        .player { position: absolute; bottom: 20px; left: 42%; transform: translateX(-50%); width: 50px; height: 90px; z-index: 20; }
        .player::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 22px; height: 22px; background: #8d5524; border-radius: 50%; border: 2px solid black; }
        .player::after { content: ''; position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #f1c40f; border-radius: 6px; border: 2px solid black; }

        .ball {
            width: 28px; height: 28px; background: white; border-radius: 50%; position: absolute;
            bottom: 25px; left: 50%; transform: translateX(-50%); border: 2px solid black; z-index: 15;
            background-image: radial-gradient(circle at 30% 30%, white, #ccc);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .controls button {
            padding: 15px 5px; font-weight: 900; background: #ffdf00; color: #004d40;
            border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px #d4ac0d;
        }

        .withdraw-section { margin-top: 15px; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 10px; border: 1px solid #2ecc71; }
        .withdraw-btn { width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .bonus-btn {
            width: 100%; padding: 15px; font-weight: 900; color: #fff;
            background: linear-gradient(45deg, #00c853, #b2ff59); border: none; border-radius: 12px;
            margin-top: 15px; cursor: pointer; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:#ffdf00; font-size: 30px;">PENALTY PAY 🏆</h1>
        <p style="color:white; margin-bottom: 25px;">RUMO AO HEXA! ⚽</p>
        <button onclick="startGame()" style="background:#2ecc71; color:white; padding:20px 40px; border:none; border-radius:50px; font-weight:bold; cursor:pointer; font-size:22px; box-shadow: 0 8px #1b5e20;">JOGAR AGORA!</button>
    </div>

    <div class="game-container">
        <h1>PENALTY PAY 🇧🇷</h1>
        <div class="slogan-vibrante">BRASIL vs ARGENTINA</div>
        
        <div class="stats-panel">
            <div class="vital-stats">
                <span>❤️ <span id="lives">5</span></span>
                <span>🪙 LTC: <span id="bal-ltc">0.00000</span></span>
            </div>
            <div id="ltc-price-box" style="font-size: 11px; color: #2ecc71;">
                LTC Hoje: <span id="ltc-value">R$ ---</span>
            </div>
        </div>

        <div class="field">
            <div class="goal"></div>
            <div id="goalkeeper" class="goalkeeper">
                <div class="gk-head"></div>
                <div class="gk-body">
                    <div class="gk-arm-l"></div>
                    <div class="gk-arm-r"></div>
                </div>
            </div>
            <div id="player-char" class="player"></div>
            <div id="ball" class="ball"></div>
        </div>

        <div id="message" style="height:30px; font-weight:900; font-size:22px; margin-bottom:10px;"></div>

        <div class="controls">
            <button onclick="shoot('left')">ESQUERDA</button>
            <button onclick="shoot('center')">CENTRO</button>
            <button onclick="shoot('right')">DIREITA</button>
        </div>

        <button onclick="openSmartLink()" class="bonus-btn">🎁 GANHAR +5 VIDAS</button>

        <div class="withdraw-section">
            <input type="text" id="fp-address" placeholder="E-mail FaucetPay" style="width:90%; padding:10px; border-radius:5px; border:1px solid #2ecc71; background:rgba(255,255,255,0.1); color:white; text-align:center; margin-bottom:10px;">
            <button onclick="requestWithdraw()" class="withdraw-btn">SACAR LTC</button>
            <button onclick="generateRefLink()" style="width:100%; margin-top:10px; background:#f39c12; color:white; border:none; padding:8px; border-radius:5px; font-weight:bold; cursor:pointer;">LINK DE SÓCIO 🔗</button>
            <div id="ref-link-display" style="display:none; margin-top:10px; font-size:10px; color:#2ecc71; word-break:break-all;"></div>
        </div>

        <!-- PROVA SOCIAL ORIGINAL -->
        <div style="margin-top:20px; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">
            <h4 style="color:#2ecc71; font-size:12px; margin-bottom:10px;">🟢 PAGAMENTOS AO VIVO</h4>
            <table style="width:100%; font-size:11px; text-align:left;">
                <tbody id="payouts-list">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // SCRIPT ORIGINAL DO ZIP
        let goals = 0; let lives = 5; let balance = 0;
        const goalSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        const saveSound = new Audio('https://www.soundjay.com/misc/sounds/fail-trombone-01.mp3');

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('ref')) lives = 10;

        function startGame() { 
            document.getElementById('start-overlay').style.display = 'none';
            fetchLTCPrice();
            updatePayoutsList();
        }

        function updateDisplay() {
            document.getElementById('lives').innerText = lives;
            document.getElementById('bal-ltc').innerText = balance.toFixed(5);
        }

        async function fetchLTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=litecoin&vs_currencies=brl');
                const data = await response.json();
                document.getElementById('ltc-value').innerText = 'R$ ' + data.litecoin.brl.toLocaleString('pt-BR');
            } catch (e) {}
        }

        function shoot(dir) {
            if (lives <= 0) { alert("Use o bônus!"); return; }
            const ball = document.getElementById('ball');
            const goalkeeper = document.getElementById('goalkeeper');
            const message = document.getElementById('message');
            let pIdx = dir === 'left' ? 1 : dir === 'center' ? 2 : 3;
            let gkIdx = Math.floor(Math.random() * 3) + 1;

            ball.style.transition = 'all 0.5s ease-out';
            if(pIdx === 1) ball.style.left = '30%';
            if(pIdx === 2) ball.style.left = '50%';
            if(pIdx === 3) ball.style.left = '70%';
            ball.style.bottom = '260px';
            ball.style.transform = 'scale(0.5) translateX(-50%)';

            if(gkIdx === 1) goalkeeper.style.left = '30%';
            if(gkIdx === 2) goalkeeper.style.left = '50%';
            if(gkIdx === 3) goalkeeper.style.left = '70%';

            setTimeout(() => {
                if (pIdx === gkIdx) {
                    lives--; message.innerText = "DEFENDEU! 🇦🇷"; message.style.color = "#ff4444"; saveSound.play().catch(()=>{});
                } else {
                    balance += 0.00001; message.innerText = "GOOOOOL! 🇧🇷"; message.style.color = "#2ecc71"; goalSound.play().catch(()=>{});
                }
                updateDisplay();
                setTimeout(() => {
                    ball.style.transition = 'none'; ball.style.bottom = '25px'; ball.style.left = '50%';
                    ball.style.transform = 'scale(1) translateX(-50%)'; goalkeeper.style.left = '50%'; message.innerText = "";
                }, 1000);
            }, 500);
        }

        function generateRefLink() {
            const addr = document.getElementById('fp-address').value;
            if(!addr) { alert("Digite seu e-mail FaucetPay!"); return; }
            const link = window.location.origin + window.location.pathname + "?ref=" + encodeURIComponent(addr);
            document.getElementById('ref-link-display').innerText = link;
            document.getElementById('ref-link-display').style.display = 'block';
            navigator.clipboard.writeText(link); alert("Link Copiado!");
        }

        function requestWithdraw() { alert("Processando saque..."); }

        function openSmartLink() {
            window.open("https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c", "_blank");
            lives = 5; updateDisplay();
        }

        function updatePayoutsList() {
            const list = document.getElementById('payouts-list');
            const mocks = [
                {u:'wi***@gmail.com', v:'0.00510 LTC'},
                {u:'ga***@faucetpay', v:'0.00820 LTC'},
                {u:'jo***@outlook.com', v:'0.00500 LTC'}
            ];
            list.innerHTML = mocks.map(p => `<tr><td>\({p.u}</td><td style="color:#2ecc71">\){p.v}</td><td>✅</td></tr>`).join('');
        }
    </script>

    <!-- ADS -->
    <script src="https://pl29728454.effectivecpmnetwork.com/86/78/6b/86786b43564a0e90e9e6615bbf17aa8c.js"></script>
</body>
</html>
