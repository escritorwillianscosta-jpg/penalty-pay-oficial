<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penalty Pay 3D Ultra 🏆 | GaMonix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at center, #004d40 0%, #00251a 100%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        .game-container {
            text-align: center;
            background: #001a33;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid #ffdf00;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }

        .stats-panel {
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 15px;
            border: 2px solid #2ecc71;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
            font-weight: 900;
            font-size: 18px;
        }

        /* CAMPO COM GRAMA PROFISSIONAL */
        .field {
            background: #2e7d32;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 50px, transparent 50px, transparent 100px),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 100px, 4px 4px;
            height: 400px;
            position: relative;
            border: 4px solid rgba(255,255,255,0.9);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
        }

        /* TRAVE COM REDE DETALHADA ⚽ */
        .goal {
            width: 75%; height: 125px; border: 8px solid white; border-bottom: none;
            position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            /* MALHA DA REDE */
            background-image: 
                linear-gradient(rgba(255,255,255,0.3) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(255,255,255,0.3) 1.5px, transparent 1.5px);
            background-size: 12px 12px;
            background-color: rgba(255,255,255,0.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            z-index: 2;
        }

        .shadow {
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            position: absolute;
            filter: blur(5px);
            z-index: 1;
        }

        /* BONECO GOLEIRO 3D (ARG) */
        .goalkeeper {
            position: absolute; top: 85px; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 95px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
        }
        .gk-head { width: 26px; height: 26px; background: radial-gradient(circle at 30% 30%, #ffe0bd, #8d5524); border-radius: 50%; margin: 0 auto; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .gk-body { 
            width: 42px; height: 55px; 
            background: linear-gradient(90deg, #74b9ff 0%, #ffffff 50%, #74b9ff 100%);
            margin: -5px auto 0; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* BONECO JOGADOR 3D (BRA) */
        .player {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 110px; z-index: 20; transition: transform 0.2s;
        }
        .pl-head { width: 28px; height: 28px; background: radial-gradient(circle at 30% 30%, #ffe0bd, #8d5524); border-radius: 50%; margin: 0 auto; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .pl-body { 
            width: 45px; height: 60px; 
            background: radial-gradient(circle at 50% 0%, #fed330, #f1c40f);
            margin: -5px auto 0; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .ball {
            width: 38px; height: 38px; background: white; border-radius: 50%; position: absolute;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            background: radial-gradient(circle at 30% 30%, #fff, #888);
            box-shadow: 0 12px 25px rgba(0,0,0,0.7); z-index: 15;
            transition: all 0.5s ease-out;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 15px; }
        .controls button {
            background: linear-gradient(#ffdf00, #d4ac0d); border: none; padding: 22px 5px;
            border-radius: 18px; font-weight: 900; color: #001a33; cursor: pointer;
            box-shadow: 0 7px 0 #997d00; font-size: 15px; text-transform: uppercase;
        }
        .controls button:active { transform: translateY(4px); box-shadow: 0 3px 0 #997d00; }

        .bonus-btn {
            width: 100%; padding: 20px; background: linear-gradient(45deg, #00c853, #b2ff59);
            color: white; border: none; border-radius: 18px; font-weight: 900;
            margin-top: 15px; cursor: pointer; animation: pulse 1.5s infinite; font-size: 20px;
            box-shadow: 0 8px 20px rgba(0,255,0,0.3);
        }

        .payouts-container {
            margin-top: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px;
            border: 1px solid rgba(46, 204, 113, 0.4);
        }
        .payout-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 5000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:#ffdf00; font-size: 45px; margin-bottom: 10px; text-shadow: 3px 3px 0 #000;">PENALTY PAY</h1>
        <p style="color:white; margin-bottom: 35px; font-size: 22px; font-weight: bold;">🇧🇷 BRASIL vs ARGENTINA 🇦🇷</p>
        <button onclick="startGame()" style="background:#2ecc71; color:white; padding:25px 70px; border:none; border-radius:60px; font-weight:900; cursor:pointer; font-size:26px; box-shadow: 0 12px #1b5e20;">COMEÇAR JOGO</button>
    </div>

    <div class="game-container">
        <div class="stats-panel">
            <span>⚽ GOLS: <span id="goals">0</span></span>
            <span style="color:#ff4444;">❤️ VIDAS: <span id="lives">5</span></span>
        </div>
        
        <div style="margin-bottom: 10px; font-size: 14px; font-weight: bold; color: #2ecc71;">
            SALDO LTC: <span id="bal-ltc">0.00000</span>
        </div>

        <div class="field">
            <div id="gk-shadow" class="shadow" style="width: 40px; height: 10px; top: 115px; left: 50%; transform: translateX(-50%);"></div>
            <div id="pl-shadow" class="shadow" style="width: 50px; height: 12px; bottom: 20px; left: 50%; transform: translateX(-50%);"></div>
            
            <div class="goal"></div>
            
            <div id="goalkeeper" class="goalkeeper">
                <div class="gk-head"></div>
                <div class="gk-body"></div>
            </div>

            <div id="player-char" class="player">
                <div class="pl-head"></div>
                <div class="pl-body"></div>
            </div>

            <div id="ball" class="ball"></div>
        </div>

        <div id="message" style="height:45px; font-weight:900; font-size:30px; text-shadow: 2px 2px #000; margin: 5px 0;"></div>

        <div class="controls">
            <button onclick="shoot('left')">ESQUERDA</button>
            <button onclick="shoot('center')">CENTRO</button>
            <button onclick="shoot('right')">DIREITA</button>
        </div>

        <button onclick="openSmartLink()" class="bonus-btn">🎁 +5 VIDAS GRÁTIS</button>

        <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #2ecc71;">
            <input type="text" id="fp-address" placeholder="E-mail FaucetPay" style="width:100%; padding:15px; border-radius:10px; border:none; text-align:center; margin-bottom: 10px; font-size: 16px;">
            <button onclick="requestWithdraw()" style="width:100%; padding:15px; background:#2ecc71; color:white; border:none; border-radius:10px; font-weight:900; font-size:16px; cursor:pointer;">SACAR LTC</button>
            <button onclick="generateRefLink()" style="width:100%; margin-top:10px; background:#f39c12; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">GERAR LINK DE SÓCIO 10%</button>
            <div id="ref-link-display" style="display:none; margin-top:10px; font-size:11px; color:#2ecc71; word-break:break-all; background:rgba(0,0,0,0.5); padding:12px; border-radius:10px;"></div>
        </div>

        <div class="payouts-container">
            <h4 style="color:#2ecc71; font-size:15px; margin-bottom: 12px; text-transform: uppercase;">🟢 PAGAMENTOS AO VIVO</h4>
            <div id="payouts-list"></div>
        </div>
    </div>

    <script>
        let goals = 0; let lives = 5; let balance = 0;
        const goalSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        const saveSound = new Audio('https://www.soundjay.com/misc/sounds/fail-trombone-01.mp3');

        function startGame() { 
            document.getElementById('start-overlay').style.display = 'none'; 
            updatePayoutsList();
        }

        function updateDisplay() {
            document.getElementById('goals').innerText = goals;
            document.getElementById('lives').innerText = lives;
            document.getElementById('bal-ltc').innerText = balance.toFixed(5);
        }

        function shoot(dir) {
            if (lives <= 0) { alert("Use o bônus!"); return; }
            const ball = document.getElementById('ball');
            const gk = document.getElementById('goalkeeper');
            const msg = document.getElementById('message');
            const player = document.getElementById('player-char');
            const gkShadow = document.getElementById('gk-shadow');

            let pIdx = dir === 'left' ? 1 : dir === 'center' ? 2 : 3;
            let gkIdx = Math.floor(Math.random() * 3) + 1;

            player.style.transform = `translateX(-50%) scale(1.1) ${pIdx === 1 ? 'rotate(-15deg)' : pIdx === 3 ? 'rotate(15deg)' : ''}`;

            ball.style.transition = 'all 0.5s ease-out';
            if(pIdx === 1) ball.style.left = '25%';
            if(pIdx === 2) ball.style.left = '50%';
            if(pIdx === 3) ball.style.left = '75%';
            ball.style.bottom = '300px';
            ball.style.transform = 'scale(0.5) translateX(-50%)';

            if(gkIdx === 1) { gk.style.left = '25%'; gkShadow.style.left = '25%'; }
            if(gkIdx === 2) { gk.style.left = '50%'; gkShadow.style.left = '50%'; }
            if(gkIdx === 3) { gk.style.left = '75%'; gkShadow.style.left = '75%'; }

            setTimeout(() => {
                if (pIdx === gkIdx) {
                    lives--; msg.innerText = "DEFENDEU! 🧤"; msg.style.color = "#ff4444"; saveSound.play().catch(()=>{});
                } else {
                    goals++; balance += 0.00001; msg.innerText = "GOOOOOL! ⚽"; msg.style.color = "#2ecc71"; goalSound.play().catch(()=>{});
                }
                updateDisplay();
                setTimeout(() => {
                    ball.style.transition = 'none'; ball.style.bottom = '40px'; ball.style.left = '50%';
                    ball.style.transform = 'scale(1) translateX(-50%)'; 
                    gk.style.left = '50%'; gkShadow.style.left = '50%';
                    player.style.transform = 'translateX(-50%)'; msg.innerText = "";
                }, 1000);
            }, 500);
        }

        function updatePayoutsList() {
            const list = document.getElementById('payouts-list');
            const mocks = [{u:'wi***@gmail.com', v:'0.00510 LTC'}, {u:'ga***@faucetpay', v:'0.00840 LTC'}, {u:'mc***@outlook.com', v:'0.00500 LTC'}];
            list.innerHTML = mocks.map(p => `<div class="payout-item"><span>\({p.u}</span><span style="color:#2ecc71; font-weight:bold;">\){p.v}</span><span>✅</span></div>`).join('');
        }

        function generateRefLink() {
            const addr = document.getElementById('fp-address').value;
            if(!addr) { alert("Digite seu e-mail FaucetPay!"); return; }
            const link = window.location.origin + window.location.pathname + "?ref=" + encodeURIComponent(addr);
            const disp = document.getElementById('ref-link-display');
            disp.innerText = link; disp.style.display = 'block';
            navigator.clipboard.writeText(link); alert("Link Copiado!");
        }

        function requestWithdraw() { alert("Processando..."); }
        function openSmartLink() { window.open("https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c", "_blank"); lives = 5; updateDisplay(); }
    </script>
    <script src="https://pl29728454.effectivecpmnetwork.com/86/78/6b/86786b43564a0e90e9e6615bbf17aa8c.js"></script>
</body>
</html>
