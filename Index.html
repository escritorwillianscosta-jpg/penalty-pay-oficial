<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Pay 🇧🇷 | GaMonix Oficial</title>
    <style>
        /* CSS COMPLETO E PROFISSIONAL */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #004d40;
            background-image: radial-gradient(circle at center, #00695c 0%, #004d40 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .game-container {
            text-align: center;
            background: #00264d;
            padding: 20px;
            border-radius: 20px;
            border: 4px solid #ffdf00;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .stats-panel { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; border: 1px solid #ffdf00; margin-bottom: 15px; }
        .crypto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; color: #2ecc71; font-weight: bold; margin-top: 10px; }
        
        .field {
            background: #2e7d32;
            height: 350px;
            border-radius: 15px;
            position: relative;
            margin: 20px 0;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            background-image: repeating-linear-gradient(90deg, #2e7d32, #2e7d32 25px, #388e3c 25px, #388e3c 50px);
        }

        .goal {
            width: 200px;
            height: 120px;
            border: 6px solid white;
            border-bottom: none;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
        }

        .goalkeeper { font-size: 60px; position: absolute; top: 80px; left: 50%; transform: translate(-50%, -50%); transition: all 0.3s ease; z-index: 10; }
        .ball {
            width: 35px; height: 35px; background: white; border-radius: 50%; position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            background-image: radial-gradient(circle at 30% 30%, #fff, #ccc);
            z-index: 5;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .controls button {
            background: #ffdf00; border: none; padding: 18px 5px; border-radius: 12px;
            font-weight: bold; cursor: pointer; box-shadow: 0 5px #d4ac0d; font-size: 14px;
        }
        .controls button:active { transform: translateY(2px); box-shadow: 0 2px #d4ac0d; }

        .withdraw-section { margin-top: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px solid #2ecc71; }
        .withdraw-btn { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .bonus-btn {
            width: 100%; padding: 15px; font-size: 18px; font-weight: 900; color: #fff;
            background: linear-gradient(45deg, #00c853, #b2ff59); border: none; border-radius: 15px;
            margin-top: 20px; cursor: pointer; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <!-- OVERLAY DE INÍCIO -->
    <div id="start-overlay">
        <h1 style="color:#ffdf00; font-size: 40px;">PENALTY PAY 🏆</h1>
        <p style="color:white; margin-bottom: 30px;">🇧🇷 RUMO AO HEXA GaMonix!</p>
        <button onclick="startGame()" style="background:#2ecc71; color:white; padding:20px 50px; border:none; border-radius:50px; font-weight:bold; cursor:pointer; font-size:24px; box-shadow: 0 10px #1b5e20;">JOGAR AGORA! ⚽</button>
    </div>

    <div class="game-container">
        <div class="stats-panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>⚽ GOLS: <span id="goals">0</span></span>
                <span>❤️ VIDAS: <span id="lives">5</span></span>
            </div>
            <div class="crypto-grid">
                <div>LTC: <span id="bal-ltc">0.00000</span></div>
                <div>LTC HOJE: <span id="ltc-value">R$ ---</span></div>
            </div>
        </div>

        <div class="field">
            <div class="goal"></div>
            <div id="goalkeeper" class="goalkeeper">🧤</div>
            <div id="ball" class="ball"></div>
        </div>

        <div id="message" style="height:35px; font-weight:900; font-size:24px; margin-bottom:10px;"></div>

        <div class="controls">
            <button onclick="shoot('left')">ESQUERDA</button>
            <button onclick="shoot('center')">CENTRO</button>
            <button onclick="shoot('right')">DIREITA</button>
        </div>

        <button class="bonus-btn" onclick="openSmartLink()">🎁 GANHAR +5 VIDAS</button>

        <!-- AFILIADOS -->
        <div class="withdraw-section" style="border-color: #f39c12;">
            <h4 style="color:#f39c12; margin:0 0 10px 0;">🏆 CONVIDE E GANHE 10%</h4>
            <button onclick="generateRefLink()" style="width:100%; background:#f39c12; color:white; border:none; border-radius:5px; padding:8px; font-weight:bold; cursor:pointer;">GERAR LINK DE SÓCIO 🔗</button>
            <div id="ref-link-display" style="display:none; margin-top:10px; font-size:10px; color:#2ecc71; word-break:break-all; background:rgba(0,0,0,0.3); padding:5px;"></div>
        </div>

        <!-- SAQUE -->
        <div class="withdraw-section">
            <input type="text" id="fp-address" placeholder="E-mail FaucetPay" style="width:90%; padding:10px; border-radius:5px; border:1px solid #2ecc71; background:rgba(255,255,255,0.1); color:white; text-align:center;">
            <button onclick="requestWithdraw()" class="withdraw-btn">SACAR LTC</button>
            <p style="font-size:10px; margin-top:5px; color:#888;">Mínimo: 0.005 LTC</p>
        </div>

        <!-- PROVA SOCIAL -->
        <div style="margin-top:20px; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; font-size:11px;">
            <h4 style="color:#2ecc71; margin-bottom:10px;">🟢 PAGAMENTOS AO VIVO</h4>
            <table style="width:100%; text-align:left;">
                <tbody id="payouts-list">
                    <tr><td>jo***@gmail.com</td><td style="color:#2ecc71">0.00520 LTC</td><td>✅</td></tr>
                    <tr><td>wi***@outlook.com</td><td style="color:#2ecc71">0.00800 LTC</td><td>✅</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let goals = 0;
        let lives = 5;
        let balance = 0;
        const goalSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        const saveSound = new Audio('https://www.soundjay.com/misc/sounds/fail-trombone-01.mp3');

        // Sistema de Referência
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if(ref) lives = 10;

        function startGame() { document.getElementById('start-overlay').style.display = 'none'; fetchLTCPrice(); }

        function updateDisplay() {
            document.getElementById('goals').innerText = goals;
            document.getElementById('lives').innerText = lives;
            document.getElementById('bal-ltc').innerText = balance.toFixed(5);
        }

        async function fetchLTCPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=litecoin&vs_currencies=brl');
                const data = await response.json();
                document.getElementById('ltc-value').innerText = 'R$ ' + data.litecoin.brl.toLocaleString('pt-BR');
            } catch (e) { console.log("Erro preço"); }
        }

        function shoot(playerDir) {
            if (lives <= 0) { alert("Sem vidas! Use o bônus."); return; }
            const ball = document.getElementById('ball');
            const goalkeeper = document.getElementById('goalkeeper');
            const message = document.getElementById('message');
            let pIdx = playerDir === 'left' ? 1 : playerDir === 'center' ? 2 : 3;
            let gkIdx = Math.floor(Math.random() * 3) + 1;

            ball.style.transition = 'all 0.5s ease-out';
            if(pIdx === 1) ball.style.left = '30%';
            if(pIdx === 2) ball.style.left = '50%';
            if(pIdx === 3) ball.style.left = '70%';
            ball.style.bottom = '260px';
            ball.style.transform = 'scale(0.5) translateX(-50%)';

            if(gkIdx === 1) goalkeeper.style.left = '30%';
            if(gkIdx === 2) goalkeeper.style.left = '50%';
            if(gkIdx === 3) goalkeeper.style.left = '70%';

            setTimeout(() => {
                if (pIdx === gkIdx) {
                    lives--; message.innerText = "DEFENDEU! 🧤"; message.style.color = "#ff4444"; saveSound.play().catch(()=>{});
                } else {
                    goals++; balance += 0.00001; message.innerText = "GOOOOOL! ⚽"; message.style.color = "#2ecc71"; goalSound.play().catch(()=>{});
                }
                updateDisplay();
                setTimeout(() => {
                    ball.style.transition = 'none'; ball.style.bottom = '30px'; ball.style.left = '50%';
                    ball.style.transform = 'scale(1) translateX(-50%)'; goalkeeper.style.left = '50%'; message.innerText = "";
                }, 1000);
            }, 500);
        }

        function generateRefLink() {
            const addr = document.getElementById('fp-address').value;
            if(!addr) { alert("Digite seu e-mail FaucetPay primeiro!"); return; }
            const link = window.location.origin + window.location.pathname + "?ref=" + encodeURIComponent(addr);
            const disp = document.getElementById('ref-link-display');
            disp.innerText = link; disp.style.display = 'block';
            navigator.clipboard.writeText(link); alert("Link copiado! Ganhe 10% de bônus!");
        }

        function requestWithdraw() {
            if(balance < 0.005) { alert("Mínimo para saque: 0.005 LTC"); return; }
            alert("Solicitação enviada! Processando via FaucetPay API...");
        }

        function openSmartLink() {
            window.open("https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c", "_blank");
            lives = 5; updateDisplay();
        }
    </script>

    <!-- Social Bar Adsterra -->
    <script src="https://pl29728454.effectivecpmnetwork.com/86/78/6b/86786b43564a0e90e9e6615bbf17aa8c.js"></script>
</body>
</html>
