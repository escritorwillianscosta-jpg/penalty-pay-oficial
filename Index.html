<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penalty Pay 🇧🇷 vs 🇦🇷 | Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #004d40;
            background-image: radial-gradient(circle at center, #00695c 0%, #004d40 100%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        .game-container {
            text-align: center;
            background: #00264d;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #ffdf00;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        /* CAMPO GIGANTE */
        .field {
            background-color: #2e7d32;
            background-image: repeating-linear-gradient(90deg, #2e7d32, #2e7d32 20px, #388e3c 20px, #388e3c 40px);
            height: 400px;
            position: relative;
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .goal {
            width: 70%; height: 120px; border: 6px solid white; border-bottom: none;
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
        }

        /* GOLEIRO ARGENTINA 🇦🇷 */
        .goalkeeper {
            position: absolute; top: 90px; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 80px; transition: all 0.3s ease; z-index: 10;
        }
        .gk-shirt { 
            width: 40px; height: 45px; margin: 0 auto;
            background: repeating-linear-gradient(90deg, #74b9ff, #74b9ff 10px, #fff 10px, #fff 20px);
            border-radius: 5px; border: 2px solid #000; position: relative;
        }
        .gk-head { width: 22px; height: 22px; background: #ffe0bd; border-radius: 50%; border: 2px solid #000; margin: -15px auto 0; }
        .gk-arm { position: absolute; width: 25px; height: 10px; background: #ffe0bd; border: 2px solid #000; top: 10px; border-radius: 5px; }
        .gk-arm.l { left: -18px; transform: rotate(20deg); }
        .gk-arm.r { right: -18px; transform: rotate(-20deg); }

        /* JOGADOR BRASIL 🇧🇷 */
        .player {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 90px; z-index: 20;
        }
        .pl-shirt { width: 38px; height: 45px; background: #fed330; border: 2px solid #000; border-radius: 5px; margin: 0 auto; position: relative; }
        .pl-head { width: 22px; height: 22px; background: #8d5524; border-radius: 50%; border: 2px solid #000; margin: -15px auto 0; }
        .pl-shorts { width: 38px; height: 15px; background: #0984e3; border: 2px solid #000; border-radius: 0 0 5px 5px; margin: -2px auto 0; }

        .ball {
            width: 38px; height: 38px; background: white; border-radius: 50%; position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            background-image: radial-gradient(circle at 30% 30%, #fff, #ccc);
            z-index: 5;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .controls button {
            background: #ffdf00; border: none; padding: 22px 5px; border-radius: 12px;
            font-weight: 900; cursor: pointer; box-shadow: 0 6px #d4ac0d; color: #00264d;
        }

        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-top: 15px; }
        .bonus-btn { background: linear-gradient(45deg, #00c853, #b2ff59); color: white; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 5000; display: flex;
            flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:#ffdf00; font-size: 40px;">PENALTY PAY 🏆</h1>
        <p style="color:white; margin-bottom: 30px; font-size: 20px;">🇧🇷 RUMO AO HEXA! ⚽</p>
        <button onclick="startGame()" style="background:#2ecc71; color:white; padding:25px 50px; border:none; border-radius:60px; font-weight:bold; cursor:pointer; font-size:24px;">JOGAR AGORA!</button>
    </div>

    <div class="game-container">
        <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.4); padding:10px; border-radius:10px; margin-bottom:10px; border:1px solid #2ecc71;">
            <span>⚽ GOLS: <span id="goals">0</span></span>
            <span style="color:#ff4444;">❤️ VIDAS: <span id="lives">5</span></span>
            <span style="color:#2ecc71;">LTC: <span id="bal-ltc">0.00000</span></span>
        </div>

        <div class="field">
            <div class="goal"></div>
            
            <!-- GOLEIRO ARGENTINA -->
            <div id="goalkeeper" class="goalkeeper">
                <div class="gk-head"></div>
                <div class="gk-shirt">
                    <div class="gk-arm l"></div>
                    <div class="gk-arm r"></div>
                </div>
            </div>

            <!-- JOGADOR BRASIL -->
            <div id="player-char" class="player">
                <div class="pl-head"></div>
                <div class="pl-shirt"></div>
                <div class="pl-shorts"></div>
            </div>

            <div id="ball" class="ball"></div>
        </div>

        <div id="message" style="height:40px; font-weight:900; font-size:26px;"></div>

        <div class="controls">
            <button onclick="shoot('left')">ESQUERDA</button>
            <button onclick="shoot('center')">CENTRO</button>
            <button onclick="shoot('right')">DIREITA</button>
        </div>

        <button class="action-btn bonus-btn" onclick="openSmartLink()">🎁 GANHAR +5 VIDAS AGORA</button>

        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #2ecc71;">
            <input type="text" id="fp-address" placeholder="E-mail FaucetPay" style="width:100%; padding:10px; border-radius:5px; text-align:center; margin-bottom:10px;">
            <button onclick="requestWithdraw()" style="width:100%; padding:10px; background:#2ecc71; color:white; border:none; border-radius:5px; font-weight:bold;">SACAR LTC</button>
            <button onclick="generateRefLink()" style="width:100%; background:#f39c12; color:white; border:none; border-radius:5px; padding:10px; font-weight:bold; margin-top:10px;">LINK DE SÓCIO 🔗</button>
            <div id="ref-link-display" style="display:none; margin-top:10px; font-size:10px; color:#2ecc71; word-break:break-all;"></div>
        </div>
    </div>

    <script>
        let goals = 0; let lives = 5; let balance = 0;
        const goalSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        const saveSound = new Audio('https://www.soundjay.com/misc/sounds/fail-trombone-01.mp3');

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('ref')) lives = 10;

        function startGame() { document.getElementById('start-overlay').style.display = 'none'; }

        function updateDisplay() {
            document.getElementById('goals').innerText = goals;
            document.getElementById('lives').innerText = lives;
            document.getElementById('bal-ltc').innerText = balance.toFixed(5);
        }

        function shoot(playerDir) {
            if (lives <= 0) { alert("Use o bônus!"); return; }
            const ball = document.getElementById('ball');
            const goalkeeper = document.getElementById('goalkeeper');
            const message = document.getElementById('message');
            const playerChar = document.getElementById('player-char');
            
            let pIdx = playerDir === 'left' ? 1 : playerDir === 'center' ? 2 : 3;
            let gkIdx = Math.floor(Math.random() * 3) + 1;

            playerChar.style.transform = 'translateX(-50%) scale(1.1) rotate(' + (pIdx === 1 ? '-10deg' : pIdx === 3 ? '10deg' : '0deg') + ')';

            ball.style.transition = 'all 0.5s ease-out';
            if(pIdx === 1) ball.style.left = '25%';
            if(pIdx === 2) ball.style.left = '50%';
            if(pIdx === 3) ball.style.left = '75%';
            ball.style.bottom = '300px';
            ball.style.transform = 'scale(0.5) translateX(-50%)';

            if(gkIdx === 1) goalkeeper.style.left = '25%';
            if(gkIdx === 2) goalkeeper.style.left = '50%';
            if(gkIdx === 3) goalkeeper.style.left = '75%';

            setTimeout(() => {
                if (pIdx === gkIdx) {
                    lives--; message.innerText = "DEFENDEU! 🧤"; message.style.color = "#ff4444"; saveSound.play().catch(()=>{});
                } else {
                    goals++; balance += 0.00001; message.innerText = "GOOOOOL! ⚽"; message.style.color = "#2ecc71"; goalSound.play().catch(()=>{});
                }
                updateDisplay();
                setTimeout(() => {
                    ball.style.transition = 'none'; ball.style.bottom = '30px'; ball.style.left = '50%';
                    ball.style.transform = 'scale(1) translateX(-50%)'; goalkeeper.style.left = '50%'; 
                    playerChar.style.transform = 'translateX(-50%)'; message.innerText = "";
                }, 1000);
            }, 500);
        }

        function generateRefLink() {
            const addr = document.getElementById('fp-address').value;
            if(!addr) { alert("Digite seu e-mail FaucetPay!"); return; }
            const link = window.location.origin + window.location.pathname + "?ref=" + encodeURIComponent(addr);
            document.getElementById('ref-link-display').innerText = link;
            document.getElementById('ref-link-display').style.display = 'block';
            navigator.clipboard.writeText(link); alert("Copiado!");
        }

        function requestWithdraw() { alert("Processando..."); }

        function openSmartLink() {
            window.open("https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c", "_blank");
            lives = 5; updateDisplay();
        }
    </script>

    <script src="https://pl29728454.effectivecpmnetwork.com/86/78/6b/86786b43564a0e90e9e6615bbf17aa8c.js"></script>
</body>
</html>
