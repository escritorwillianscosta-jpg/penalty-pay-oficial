<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Pay 🇧🇷 | GaMonix</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #004d40;
            background-image: radial-gradient(circle at center, #00695c 0%, #004d40 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .game-container {
            text-align: center;
            background: #00264d;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid #ffdf00;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 8px; border: 1px solid #ffdf00; font-size: 14px; }
        
        .field {
            background: #2e7d32;
            height: 300px;
            border-radius: 10px;
            position: relative;
            margin: 15px 0;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            background-image: repeating-linear-gradient(90deg, #2e7d32, #2e7d32 20px, #388e3c 20px, #388e3c 40px);
        }

        .goal {
            width: 180px;
            height: 100px;
            border: 5px solid white;
            border-bottom: none;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
        }

        .goalkeeper {
            font-size: 50px;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .ball {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            background-image: radial-gradient(circle at 30% 30%, #fff, #ccc);
            z-index: 5;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .controls button {
            background: #ffdf00;
            border: none;
            padding: 15px 5px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #d4ac0d;
        }
        .controls button:active { transform: translateY(2px); box-shadow: 0 2px #d4ac0d; }

        .bonus-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(45deg, #00c853, #b2ff59);
            border: none;
            border-radius: 12px;
            margin-top: 15px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- TELA DE INÍCIO -->
        <div id="start-overlay">
            <h1 style="color:#ffdf00">PENALTY PAY</h1>
            <p>Ganhe LTC no estádio GaMonix</p>
            <button onclick="startGame()" style="background:#2ecc71; color:white; padding:15px 30px; border:none; border-radius:50px; font-weight:bold; cursor:pointer; font-size:20px">JOGAR AGORA</button>
        </div>

        <div class="header">
            <div class="stat-box">⚽ GOLS: <span id="goals">0</span></div>
            <div class="stat-box">❤️ VIDAS: <span id="lives">5</span></div>
        </div>

        <div class="stat-box" style="margin-bottom:10px; color:#2ecc71">SALDO: <span id="bal-ltc">0.00000</span> LTC</div>

        <div class="field">
            <div class="goal"></div>
            <div id="goalkeeper" class="goalkeeper">🧤</div>
            <div id="ball" class="ball"></div>
        </div>

        <div id="message" style="height:30px; font-weight:bold; font-size:20px"></div>

        <div class="controls">
            <button onclick="shoot('left')">ESQUERDA</button>
            <button onclick="shoot('center')">CENTRO</button>
            <button onclick="shoot('right')">DIREITA</button>
        </div>

        <button class="bonus-btn" onclick="openSmartLink()">🎁 GANHAR +5 VIDAS</button>

        <div style="margin-top: 15px; font-size: 10px; color: #888;">
            GaMonix &copy; 2026 - Versão Ultra Estável
        </div>
    </div>

    <script>
        let goals = 0;
        let lives = 5;
        let balance = 0;

        // Sons com tratamento de erro para evitar tela preta
        const goalSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        const saveSound = new Audio('https://www.soundjay.com/misc/sounds/fail-trombone-01.mp3');

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
        }

        function updateDisplay() {
            document.getElementById('goals').innerText = goals;
            document.getElementById('lives').innerText = lives;
            document.getElementById('bal-ltc').innerText = balance.toFixed(5);
        }

        function shoot(playerDir) {
            if (lives <= 0) {
                alert("Acabaram as vidas! Clique no bônus para recarregar.");
                return;
            }

            const ball = document.getElementById('ball');
            const goalkeeper = document.getElementById('goalkeeper');
            const message = document.getElementById('message');
            
            // Direções: 1=Esquerda, 2=Centro, 3=Direita
            let playerIdx = playerDir === 'left' ? 1 : playerDir === 'center' ? 2 : 3;
            let gkIdx = Math.floor(Math.random() * 3) + 1;

            // Animação da bola
            ball.style.transition = 'all 0.5s ease-out';
            if(playerIdx === 1) ball.style.left = '30%';
            if(playerIdx === 2) ball.style.left = '50%';
            if(playerIdx === 3) ball.style.left = '70%';
            ball.style.bottom = '220px';
            ball.style.transform = 'scale(0.5) translateX(-50%)';

            // Animação do goleiro
            if(gkIdx === 1) goalkeeper.style.left = '30%';
            if(gkIdx === 2) goalkeeper.style.left = '50%';
            if(gkIdx === 3) goalkeeper.style.left = '70%';

            setTimeout(() => {
                if (playerIdx === gkIdx) {
                    lives--;
                    message.innerText = "DEFENDEU! 🧤";
                    message.style.color = "#ff4444";
                    saveSound.play().catch(() => {});
                } else {
                    goals++;
                    balance += 0.00001;
                    message.innerText = "GOOOOOL! ⚽";
                    message.style.color = "#2ecc71";
                    goalSound.play().catch(() => {});
                }
                updateDisplay();

                // Resetar posição
                setTimeout(() => {
                    ball.style.transition = 'none';
                    ball.style.bottom = '25px';
                    ball.style.left = '50%';
                    ball.style.transform = 'scale(1) translateX(-50%)';
                    goalkeeper.style.left = '50%';
                    message.innerText = "";
                }, 1000);
            }, 500);
        }

        function openSmartLink() {
            // Seu link de anúncios Adsterra/Smartlink
            window.open("https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c", "_blank");
            lives = 5;
            updateDisplay();
            alert("Vidas recarregadas! Boa sorte!");
        }
    </script>

    <!-- Adsterra Social Bar -->
    <script src="https://pl29728454.effectivecpmnetwork.com/86/78/6b/86786b43564a0e90e9e6615bbf17aa8c.js"></script>
</body>
</html>
