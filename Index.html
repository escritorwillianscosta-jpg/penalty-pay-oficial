<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penalty Pay Oficial | GaMonix 🏆</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at center, #004d40 0%, #00251a 100%);
            color: white; display: flex; justify-content: center; min-height: 100vh; padding: 10px;
            overflow: hidden;
        }

        .game-container {
            text-align: center; background: #001a33; padding: 15px; border-radius: 20px;
            border: 4px solid #ffdf00; width: 100%; max-width: 900px; box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            position: relative;
        }

        .scoreboard {
            background: #000; border: 2px solid #555; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; margin-bottom: 10px;
        }
        .score-num { background: #222; color: #ffdf00; padding: 4px 10px; border-radius: 5px; font-size: 22px; font-family: monospace; }

        .field {
            background: #2e7d32;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 50px, transparent 50px, transparent 100px);
            height: 380px; position: relative; border: 4px solid white; border-radius: 10px; 
            overflow: hidden; perspective: 1000px; cursor: pointer;
        }

        /* TORCIDA REALISTA EM DEGRAUS */
        .stadium-stands {
            position: absolute; top: 0; left: 0; width: 100%; height: 70px;
            background: linear-gradient(to bottom, #111 0%, #333 100%);
            display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-end; gap: 3px; padding-bottom: 5px;
        }
        .fan { width: 12px; height: 16px; background: #fed330; border-radius: 3px 3px 0 0; position: relative; }
        .fan::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #ffe0bd; border-radius: 50%; }
        .fan:nth-child(even) { background: #2ecc71; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .celebrate .fan { animation: jump 0.3s infinite; }

        /* BOLA ⚽ */
        .ball {
            width: 38px; height: 38px; background: #fff; border-radius: 50%; position: absolute;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            background-image: radial-gradient(circle at 50% 50%, #000 15%, transparent 16%), radial-gradient(circle at 10% 30%, #000 10%, transparent 11%), radial-gradient(circle at 90% 30%, #000 10%, transparent 11%), radial-gradient(circle at 30% 90%, #000 10%, transparent 11%), radial-gradient(circle at 70% 90%, #000 10%, transparent 11%);
            box-shadow: 0 8px 15px rgba(0,0,0,0.6); z-index: 15;
        }

        /* PROVAS DE PAGAMENTO DINÂMICAS */
        .payouts-section {
            margin-top: 15px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 15px;
            border: 1px solid #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
            height: 100px; overflow: hidden; position: relative;
        }
        #payout-list { transition: all 0.5s ease; }
        .payout-item {
            display: flex; justify-content: space-between; padding: 5px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .bonus-btn {
            width: 100%; padding: 16px; background: linear-gradient(45deg, #00c853, #b2ff59);
            border: none; border-radius: 12px; font-weight: 900; color: white;
            margin-top: 10px; cursor: pointer; font-size: 18px; text-transform: uppercase;
        }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:#ffdf00; font-size: 40px;">PENALTY PAY 🏆</h1>
        <button onclick="startGame()" style="background:#2ecc71; color:white; padding:18px 50px; border:none; border-radius:50px; font-weight:900; cursor:pointer; font-size:22px; margin-top:20px;">JOGAR AGORA!</button>
    </div>

    <div class="game-container">
        <div class="scoreboard">
            <div style="display:flex; align-items:center; gap:5px;"><span>🇧🇷</span> <span id="score-bra" class="score-num">0</span></div>
            <div style="font-size:10px; color:#aaa;">PAGANDO VIA PIX/LTC</div>
            <div style="display:flex; align-items:center; gap:5px;"><span id="score-arg" class="score-num">0</span> <span>🇦🇷</span></div>
        </div>

        <div style="background:rgba(0,0,0,0.3); padding:6px; border-radius:10px; margin-bottom:8px; display: flex; justify-content: space-around; font-size: 14px;">
            <span style="color:#ff4444; font-weight:bold;">❤️ VIDAS: <span id="lives">5</span></span>
            <span style="color:#2ecc71; font-weight:bold;">💰 LTC: <span id="bal-ltc">0.00000</span></span>
        </div>

        <div id="game-field" class="field" onclick="handleTouch(event)">
            <div id="stadium-stands" class="stadium-stands"></div>
            <div id="goal-container" style="position:absolute; top:70px; left:50%; transform:translateX(-50%); width:70%; height:110px; border:6px solid white; border-bottom:none; z-index:2;">
                <div id="net" style="width:100%; height:100%; background: repeating-linear-gradient(rgba(255,255,255,0.1) 0 2px, transparent 2px 10px), repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0 2px, transparent 2px 10px);"></div>
            </div>

            <div id="goalkeeper" style="position:absolute; top:150px; left:50%; transform:translate(-50%,-50%); width:50px; height:80px; z-index:20; transition:0.3s;">
                <div style="width:20px; height:20px; background:#ffe0bd; border-radius:50%; margin:0 auto;"></div>
                <div style="width:35px; height:50px; background:#74b9ff; margin:0 auto; border-radius:5px;"></div>
            </div>

            <div id="player-char" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); width:60px; height:100px; z-index:25; transition:0.3s;">
                <div style="width:22px; height:22px; background:#ffe0bd; border-radius:50%; margin:0 auto;"></div>
                <div style="width:40px; height:50px; background:#fed330; margin:0 auto; border-radius:5px; border-top:4px solid #2ecc71;"></div>
                <div style="width:38px; height:15px; background:#00468e; margin: -2px auto 0;"></div>
            </div>
            
            <div id="ball" class="ball"></div>
        </div>

        <div id="message" style="height:35px; font-weight:900; font-size:24px; margin-top:8px; text-shadow: 2px 2px #000;"></div>

        <button onclick="window.open('https://www.effectivecpmnetwork.com/fdd2jqkg?key=050a9b29a9d3d604da9295925df8ca6c', '_blank'); lives=5; updateDisplay();" class="bonus-btn">BÔNUS</button>

        <!-- SEÇÃO DE PROVAS DE PAGAMENTO MELHORADA -->
        <div class="payouts-section">
            <h4 style="color:#2ecc71; margin-bottom:5px; font-size:12px; text-align:left;">🟢 PROVAS DE PAGAMENTO AO VIVO</h4>
            <div id="payout-list">
                <!-- Pagamentos entram aqui via JS -->
            </div>
        </div>

        <div style="margin-top:10px; color:#aaa; font-size:10px;">Produzido por: <strong>GAMONIX</strong> | © Todos os Direitos Reservados</div>
    </div>

    <script>
        let goalsBra = 0; let goalsArg = 0;
        let lives = parseInt(localStorage.getItem('pp_lives')) || 5;
        let balance = parseFloat(localStorage.getItem('pp_balance')) || 0;
        let isShooting = false;

        const sndApito = new Audio('apito.mp3');
        const sndTorcida = new Audio('torcida.mp3');
        const sndGol = new Audio('gol.mp3');
        const sndDefesa = new Audio('defesa.mp3');

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            sndApito.play().catch(()=>{});
            sndTorcida.loop = true; sndTorcida.volume = 0.2;
            sndTorcida.play().catch(()=>{});
            updateDisplay();
            startPayouts(); // Inicia o feed de provas
        }

        // FUNÇÃO DE PROVAS DE PAGAMENTO DINÂMICAS
        const emails = ["wi***", "ca***", "ma***", "lu***", "pa***", "fe***", "gu***", "an***", "ro***", "th***"];
        const providers = ["@gmail.com", "@outlook.com", "@faucetpay", "@hotmail.com"];

        function startPayouts() {
            setInterval(() => {
                const list = document.getElementById('payout-list');
                const email = emails[Math.floor(Math.random() * emails.length)] + providers[Math.floor(Math.random() * providers.length)];
                const val = (Math.random() * 0.009 + 0.001).toFixed(5);
                
                const item = document.createElement('div');
                item.className = 'payout-item';
                item.innerHTML = `<span>\({email}</span><span style="color:#2ecc71;">\){val} LTC ✅</span>`;
                
                list.prepend(item);
                if (list.children.length > 3) list.lastChild.remove();
            }, 4000);
        }

        // Montar torcida
        const stands = document.getElementById('stadium-stands');
        for(let i=0; i<40; i++) {
            const f = document.createElement('div'); f.className = 'fan';
            stands.appendChild(f);
        }

        function updateDisplay() {
            document.getElementById('score-bra').innerText = goalsBra;
            document.getElementById('score-arg').innerText = goalsArg;
            document.getElementById('lives').innerText = lives;
            document.getElementById('bal-ltc').innerText = balance.toFixed(5);
            localStorage.setItem('pp_lives', lives);
            localStorage.setItem('pp_balance', balance);
        }

        function handleTouch(e) {
            if (isShooting) return;
            if (lives <= 0) { alert("Clica em Bônus para carregar vidas!"); return; }
            const field = document.getElementById('game-field');
            const rect = field.getBoundingClientRect();
            const touchX = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const fieldWidth = rect.width;
            let dir = touchX < fieldWidth/3 ? 'left' : touchX > (fieldWidth/3)*2 ? 'right' : 'center';
            shoot(dir);
        }

        function shoot(dir) {
            isShooting = true;
            const ball = document.getElementById('ball');
            const gk = document.getElementById('goalkeeper');
            const pl = document.getElementById('player-char');
            const msg = document.getElementById('message');
            const stands = document.getElementById('stadium-stands');

            let pIdx = dir === 'left' ? 1 : dir === 'center' ? 2 : 3;
            let gkIdx = Math.floor(Math.random() * 3) + 1;

            pl.style.transform = `translateX(-50%) translateY(-10px) scale(1.1)`;
            ball.style.transition = 'all 0.5s ease-out';
            ball.style.bottom = '270px';
            ball.style.left = pIdx === 1 ? '20%' : pIdx === 2 ? '50%' : '80%';
            ball.style.transform = 'scale(0.5) rotate(360deg) translateX(-50%)';
            gk.style.left = gkIdx === 1 ? '20%' : gkIdx === 2 ? '50%' : '80%';

            setTimeout(() => {
                if (pIdx === gkIdx) {
                    lives--; goalsArg++; msg.innerText = "DEFENDEU! 🧤"; msg.style.color = "#ff4444";
                    sndDefesa.play().catch(()=>{});
                    ball.style.zIndex = "10"; ball.style.bottom = "230px";
                } else {
                    goalsBra++; balance += 0.00001; msg.innerText = "GOOOOOL! ⚽"; msg.style.color = "#2ecc71";
                    sndGol.play().catch(()=>{});
                    stands.classList.add('celebrate');
                    setTimeout(() => stands.classList.remove('celebrate'), 1000);
                }
                updateDisplay();
                setTimeout(() => {
                    ball.style.transition = 'none'; ball.style.bottom = '40px'; ball.style.left = '50%';
                    ball.style.transform = 'scale(1) rotate(0deg) translateX(-50%)';
                    ball.style.zIndex = "15"; gk.style.left = '50%'; pl.style.transform = 'translateX(-50%)';
                    msg.innerText = ""; isShooting = false;
                }, 1200);
            }, 500);
        }
    </script>
</body>
</html>
